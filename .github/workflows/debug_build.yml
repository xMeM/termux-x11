name: Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'img/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'img/**'
  workflow_dispatch:

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        sudo apt update && sudo apt install -y libarchive-tools binutils-aarch64-linux-gnu binutils-arm-linux-gnueabihf
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Validation
      uses: gradle/wrapper-validation-action@v1
      
    - name: Java setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Restore cache
      uses: actions/cache@v3
      with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

          restore-keys: |
            ${{ runner.os }}-gradle-

    - name: Build
      run: ./gradlew assembleDebug
    - name: Store app-arm64-v8a-debug
      uses: actions/upload-artifact@v3
      with:
        name: termux-x11-arm64-v8a-debug
        path: ./app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
    
